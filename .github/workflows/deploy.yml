name: Deploy to Mac Mini

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set Python version (from project directory)
        run: |
          cd /Users/sam/Coding/ai-tells-time
          uv python pin 3.12

      - name: Install dependencies (clean sync from project directory)
        run: |
          cd /Users/sam/Coding/ai-tells-time
          rm -rf .venv uv.lock
          uv sync

      - name: Ensure secrets directory exists
        run: mkdir -p ~/.config/ai-tells-time

      - name: Copy .env.example if no .env exists
        run: |
          if [ ! -f ~/.config/ai-tells-time/.env ]; then
            cp .env.example ~/.config/ai-tells-time/.env
            echo "Created ~/.config/ai-tells-time/.env from .env.example"
            echo "Please edit it with your OBS WebSocket password and API keys"
          fi

      - name: Start the application
        run: |
          cd /Users/sam/Coding/ai-tells-time
          nohup uv run main.py >> app.log 2>&1 &
          echo "Started ai-tells-time in background (see app.log for output)"
